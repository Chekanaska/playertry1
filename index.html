<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Audio Player Editor</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: Inter, Arial, sans-serif;
    color: #fff;
    background:
      radial-gradient(circle at 10% 10%, rgba(124,92,255,.32), transparent 32%),
      radial-gradient(circle at 90% 0%, rgba(0,212,255,.22), transparent 34%),
      linear-gradient(135deg,#090d1a,#151b31);
    padding: 22px;
  }

  .app {
    max-width: 1320px;
    margin: 0 auto;
  }

  h1 {
    margin: 0 0 8px;
    font-size: clamp(30px,4vw,48px);
    letter-spacing: -1.5px;
  }

  .sub {
    margin: 0 0 22px;
    color: rgba(255,255,255,.68);
    line-height: 1.5;
  }

  .grid {
    display: grid;
    grid-template-columns: 430px 1fr;
    gap: 18px;
    align-items: start;
  }

  .panel {
    border: 1px solid rgba(255,255,255,.13);
    border-radius: 28px;
    background: rgba(255,255,255,.08);
    box-shadow: 0 24px 70px rgba(0,0,0,.34);
    backdrop-filter: blur(16px);
    overflow: hidden;
  }

  .head {
    padding: 17px 20px;
    border-bottom: 1px solid rgba(255,255,255,.09);
    font-weight: 900;
  }

  .body {
    padding: 18px;
  }

  .form {
    display: grid;
    gap: 14px;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  label {
    display: grid;
    gap: 7px;
    font-size: 13px;
    font-weight: 800;
    color: rgba(255,255,255,.85);
  }

  input, textarea, select {
    width: 100%;
    border: 1px solid rgba(255,255,255,.13);
    border-radius: 16px;
    background: rgba(0,0,0,.24);
    color: #fff;
    padding: 12px 13px;
    outline: none;
    font: inherit;
  }

  textarea {
    min-height: 96px;
    resize: vertical;
    line-height: 1.45;
  }

  input[type="color"] {
    height: 46px;
    padding: 4px;
  }

  input[type="range"] {
    padding: 0;
    accent-color: #7c5cff;
  }

  .hint {
    font-size: 12px;
    line-height: 1.45;
    color: rgba(255,255,255,.55);
    font-weight: 500;
  }

  .val {
    font-size: 12px;
    color: rgba(255,255,255,.7);
    font-weight: 600;
  }

  .buttons {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  button {
    border: 0;
    cursor: pointer;
    border-radius: 16px;
    padding: 12px 16px;
    color: #fff;
    font: inherit;
    font-weight: 900;
    background: linear-gradient(135deg,#7c5cff,#00d4ff);
    box-shadow: 0 16px 35px rgba(0,0,0,.26);
  }

  button.secondary {
    background: rgba(255,255,255,.11);
    border: 1px solid rgba(255,255,255,.12);
  }

  .preview-stage {
    min-height: 500px;
    display: grid;
    place-items: center;
    padding: 22px;
    overflow: auto;
    border-radius: 24px;
    background:
      linear-gradient(45deg, rgba(255,255,255,.04) 25%, transparent 25%),
      linear-gradient(-45deg, rgba(255,255,255,.04) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, rgba(255,255,255,.04) 75%),
      linear-gradient(-45deg, transparent 75%, rgba(255,255,255,.04) 75%);
    background-size: 24px 24px;
    background-position: 0 0, 0 12px, 12px -12px, -12px 0;
  }

  #code {
    min-height: 220px;
    font-family: Consolas, monospace;
    font-size: 12px;
    white-space: pre;
  }

  @media (max-width: 980px) {
    .grid { grid-template-columns: 1fr; }
  }

  @media (max-width: 620px) {
    body { padding: 14px; }
    .row { grid-template-columns: 1fr; }
  }
</style>
</head>

<body>
<div class="app">
  <h1>Audio Player Editor</h1>
  <p class="sub">Редактор красивого аудиоплеера для Genially: настрой размер, шрифты, цвета, обложку, плейлист и получи готовый iframe-код.</p>

  <div class="grid">
    <section class="panel">
      <div class="head">Настройки</div>
      <div class="body">
        <div class="form">
          <label>
            Название плеера
            <input id="title" value="My Playlist">
          </label>

          <label>
            GitHub-папка или raw-ссылки
            <textarea id="source" placeholder="https://github.com/Chekanaska/playertry1/tree/main/audio

или raw-ссылки построчно"></textarea>
            <span class="hint">Поддерживаются mp3, wav, ogg, m4a, aac, flac.</span>
          </label>

          <label>
            Обложка
            <input id="cover" value="https://static.klipy.com/ii/c98c4a4935d23b95805f0befee091d8a/8d/4a/Bui1PgqT.gif">
          </label>

          <div class="row">
            <label>
              Язык
              <select id="lang">
                <option value="ru" selected>Русский</option>
                <option value="en">English</option>
              </select>
            </label>

            <label>
              Шрифт
              <select id="font">
                <option value="Inter, Arial, sans-serif" selected>Inter</option>
                <option value="Arial, sans-serif">Arial</option>
                <option value="'Trebuchet MS', sans-serif">Trebuchet</option>
                <option value="'Verdana', sans-serif">Verdana</option>
                <option value="'Georgia', serif">Georgia</option>
                <option value="'Courier New', monospace">Courier New</option>
              </select>
            </label>
          </div>

          <div class="row">
            <label>
              Основной цвет
              <input id="accent" type="color" value="#7c5cff">
            </label>
            <label>
              Второй цвет
              <input id="accent2" type="color" value="#00d4ff">
            </label>
          </div>

          <div class="row">
            <label>
              Панель
              <input id="panel" type="color" value="#121a33">
            </label>
            <label>
              Текст
              <input id="text" type="color" value="#ffffff">
            </label>
          </div>

          <div class="row">
            <label>
              Ширина, px
              <input id="width" type="number" min="280" max="1000" value="560">
            </label>
            <label>
              Высота, px
              <input id="height" type="number" min="260" max="900" value="360">
            </label>
          </div>

          <div class="row">
            <label>
              Размер шрифта <span class="val" id="fontSizeVal">14 px</span>
              <input id="fontSize" type="range" min="10" max="22" value="14">
            </label>
            <label>
              Размер обложки <span class="val" id="coverSizeVal">110 px</span>
              <input id="coverSize" type="range" min="60" max="170" value="110">
            </label>
          </div>

          <div class="row">
            <label>
              Скругление <span class="val" id="radiusVal">28 px</span>
              <input id="radius" type="range" min="8" max="44" value="28">
            </label>
            <label>
              Тень <span class="val" id="shadowVal">28</span>
              <input id="shadow" type="range" min="0" max="50" value="28">
            </label>
          </div>

          <label>
            Прозрачность панели <span class="val" id="opacityVal">88%</span>
            <input id="opacity" type="range" min="60" max="100" value="88">
          </label>

          <div class="buttons">
            <button id="previewBtn">Обновить</button>
            <button id="getCodeBtn">Получить код</button>
            <button class="secondary" id="copyBtn">Копировать</button>
          </div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="head">Предпросмотр</div>
      <div class="body">
        <div class="preview-stage" id="preview"></div>
      </div>

      <div class="head">Код для Genially</div>
      <div class="body">
        <textarea id="code" readonly placeholder="Нажми «Получить код»"></textarea>
      </div>
    </section>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

const labels = {
  ru: {
    playlist: "Плейлист",
    speed: "Скорость",
    volume: "Громкость",
    choose: "Выбрать трек",
    empty: "Добавь ссылку на папку GitHub или raw-ссылки",
    loading: "Загружаю треки...",
    notFound: "Треки не найдены",
    now: "Сейчас играет"
  },
  en: {
    playlist: "Playlist",
    speed: "Speed",
    volume: "Volume",
    choose: "Choose track",
    empty: "Add GitHub folder or raw links",
    loading: "Loading tracks...",
    notFound: "No tracks found",
    now: "Now playing"
  }
};

const ids = [
  "title","source","cover","lang","font","accent","accent2","panel","text",
  "width","height","fontSize","coverSize","radius","shadow","opacity"
];

function updateVals() {
  $("fontSizeVal").textContent = $("fontSize").value + " px";
  $("coverSizeVal").textContent = $("coverSize").value + " px";
  $("radiusVal").textContent = $("radius").value + " px";
  $("shadowVal").textContent = $("shadow").value;
  $("opacityVal").textContent = $("opacity").value + "%";
}

function cfg() {
  return {
    title: $("title").value.trim() || "My Playlist",
    source: $("source").value.trim(),
    cover: $("cover").value.trim(),
    lang: $("lang").value,
    font: $("font").value,
    accent: $("accent").value,
    accent2: $("accent2").value,
    panel: $("panel").value,
    text: $("text").value,
    width: Math.max(280, Number($("width").value) || 560),
    height: Math.max(260, Number($("height").value) || 360),
    fontSize: Number($("fontSize").value) || 14,
    coverSize: Number($("coverSize").value) || 110,
    radius: Number($("radius").value) || 28,
    shadow: Number($("shadow").value) || 28,
    opacity: Number($("opacity").value) || 88
  };
}

function escapeAttr(str) {
  return String(str).replace(/&/g,"&amp;").replace(/'/g,"&#39;");
}

function iframeCode(c) {
  const doc = playerDoc(c);
  return `<iframe srcdoc='${escapeAttr(doc)}' style="width:${c.width}px;height:${c.height}px;border:0;background:transparent;overflow:hidden;" allow="autoplay" scrolling="no"></iframe>`;
}

function preview() {
  updateVals();
  $("preview").innerHTML = iframeCode(cfg());
}

function getCode() {
  updateVals();
  const code = iframeCode(cfg());
  $("code").value = code;
  $("preview").innerHTML = code;
}

$("previewBtn").onclick = preview;
$("getCodeBtn").onclick = getCode;

$("copyBtn").onclick = async () => {
  if (!$("code").value.trim()) getCode();
  await navigator.clipboard.writeText($("code").value);
  $("copyBtn").textContent = "Скопировано!";
  setTimeout(() => $("copyBtn").textContent = "Копировать", 1400);
};

ids.forEach(id => {
  $(id).addEventListener("input", preview);
  $(id).addEventListener("change", preview);
});

function playerDoc(c) {
  const t = labels[c.lang] || labels.ru;
  const safe = JSON.stringify(c).replace(/</g, "\\u003c");
  const safeText = JSON.stringify(t).replace(/</g, "\\u003c");

  return `<!doctype html>
<html lang="${c.lang}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:transparent;
  overflow:hidden;
}
body{
  font-family:${c.font};
  font-size:${c.fontSize}px;
}
.player{
  --accent:${c.accent};
  --accent2:${c.accent2};
  --panel:${c.panel};
  --text:${c.text};
  width:100%;
  height:100%;
  color:var(--text);
  border-radius:${c.radius}px;
  background:
    radial-gradient(circle at 0% 0%, color-mix(in srgb, var(--accent) 34%, transparent), transparent 35%),
    radial-gradient(circle at 100% 0%, color-mix(in srgb, var(--accent2) 28%, transparent), transparent 34%),
    color-mix(in srgb, var(--panel) ${c.opacity}%, transparent);
  border:1px solid rgba(255,255,255,.13);
  box-shadow:0 ${Math.round(c.shadow*.8)}px ${Math.round(c.shadow*2.4)}px rgba(0,0,0,.38);
  backdrop-filter:blur(16px);
  overflow:hidden;
  display:grid;
  grid-template-columns:minmax(96px, ${c.coverSize + 34}px) minmax(0,1fr);
  min-width:0;
  min-height:0;
}
.left{
  min-width:0;
  min-height:0;
  padding:clamp(10px, 3.4vw, 18px);
  border-right:1px solid rgba(255,255,255,.08);
  display:grid;
  grid-template-rows:auto auto auto 1fr;
  gap:clamp(6px, 1.7vw, 12px);
  overflow:hidden;
}
.cover{
  width:min(${c.coverSize}px, 100%);
  aspect-ratio:1/1;
  max-height:44vh;
  border-radius:${Math.max(14, Math.round(c.radius * .65))}px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.13);
  box-shadow:0 14px 26px rgba(0,0,0,.24);
}
.cover img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.now{
  font-size:.78em;
  opacity:.68;
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.left-title{
  font-size:1em;
  line-height:1.18;
  font-weight:950;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}
.pulse{
  height:clamp(20px, 10vh, 44px);
  display:flex;
  align-items:flex-end;
  gap:3px;
  min-height:0;
}
.pulse span{
  flex:1;
  min-width:3px;
  border-radius:999px;
  background:linear-gradient(to top,var(--accent),var(--accent2));
  height:18%;
  animation:bounce 1s ease-in-out infinite;
  animation-play-state:paused;
}
.playing .pulse span{animation-play-state:running}
.pulse span:nth-child(2n){animation-duration:.82s}
.pulse span:nth-child(3n){animation-duration:1.12s}
@keyframes bounce{
  0%,100%{height:18%}
  42%{height:100%}
  72%{height:38%}
}
.right{
  position:relative;
  min-width:0;
  min-height:0;
  padding:clamp(10px, 3.2vw, 18px);
  display:grid;
  grid-template-rows:auto auto auto minmax(0,1fr) auto;
  gap:clamp(7px, 1.8vh, 13px);
  overflow:hidden;
}
.top{
  min-width:0;
  display:flex;
  justify-content:space-between;
  gap:10px;
}
.titles{
  min-width:0;
}
.player-title{
  font-size:.82em;
  font-weight:800;
  opacity:.68;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  margin-bottom:3px;
}
.track-title{
  font-size:clamp(14px, 1.42em, 24px);
  line-height:1.08;
  font-weight:950;
  letter-spacing:-.3px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.playlist-button{
  flex:0 0 auto;
  border:0;
  cursor:pointer;
  color:var(--text);
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.12);
  border-radius:14px;
  height:38px;
  padding:0 12px;
  font:inherit;
  font-size:.82em;
  font-weight:900;
  white-space:nowrap;
}
.progress-area{
  display:grid;
  gap:6px;
}
.time{
  display:flex;
  justify-content:space-between;
  font-size:.78em;
  font-weight:800;
  opacity:.72;
}
.progress{
  height:9px;
  border-radius:999px;
  background:rgba(255,255,255,.14);
  overflow:hidden;
  cursor:pointer;
}
.fill{
  height:100%;
  width:0%;
  border-radius:inherit;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}
.controls{
  display:flex;
  align-items:center;
  gap:8px;
}
.icon,
.play{
  border:0;
  cursor:pointer;
  color:var(--text);
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.12);
  font:inherit;
  font-weight:900;
}
.icon{
  width:clamp(34px, 8vh, 44px);
  height:clamp(34px, 8vh, 44px);
  border-radius:14px;
}
.play{
  width:clamp(44px, 10vh, 58px);
  height:clamp(44px, 10vh, 58px);
  border-radius:18px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  box-shadow:0 12px 28px rgba(0,0,0,.24);
}
.tools{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  align-self:end;
  min-height:0;
}
.tool{
  min-width:0;
  display:grid;
  gap:5px;
  padding:8px;
  border-radius:14px;
  background:rgba(0,0,0,.17);
  border:1px solid rgba(255,255,255,.09);
}
.tool-label{
  font-size:.74em;
  font-weight:850;
  opacity:.66;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
select,input[type=range]{
  width:100%;
  min-width:0;
}
select{
  border:0;
  outline:0;
  color:var(--text);
  background:rgba(255,255,255,.12);
  border-radius:10px;
  padding:6px;
  font:inherit;
  font-size:.82em;
  font-weight:800;
}
input[type=range]{
  accent-color:var(--accent);
}
.playlist-panel{
  position:absolute;
  inset:10px;
  z-index:10;
  display:none;
  grid-template-rows:auto minmax(0,1fr);
  gap:10px;
  padding:12px;
  border-radius:${Math.max(14, c.radius - 6)}px;
  background:rgba(8,11,20,.94);
  border:1px solid rgba(255,255,255,.13);
  backdrop-filter:blur(18px);
  box-shadow:0 22px 60px rgba(0,0,0,.42);
  min-height:0;
}
.playlist-panel.open{
  display:grid;
}
.playlist-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;

}
.close{

  background:rgba(255,255,255,.12);

}
.tracks{

  display:grid;
  align-content:start;
  gap:7px;
}
.track{
  text-align:left;
  border:0;
  cursor:pointer;
  color:var(--text);

  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:9px 10px;
  font:inherit;
  font-size:.86em;
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.track.active{
  background:linear-gradient(90deg,color-mix(in srgb,var(--accent) 36%, transparent),rgba(255,255,255,.08));
}
.message{
  font-size:.86em;
  line-height:1.4;
  color:rgba(255,255,255,.68);
}
@media (max-width:420px), (max-height:310px){

    grid-template-columns:1fr;

    grid-template-columns:auto 1fr;

  }
  .cover{
    width:clamp(54px, 20vw, 82px);
    grid-row:1/3;
  }
  .pulse{display:none}
  .right{
    grid-template-rows:auto auto auto auto;
  }
  .tools{
    grid-template-columns:1fr 1fr;
  }
}
</style>
</head>

<body>
<div class="player" id="root">
  <div class="left">
    <div class="cover"><img id="coverImg" src="${c.cover}" alt=""></div>
    <div class="now" id="nowLabel">${t.now}</div>
    <div class="left-title" id="leftTitle">${t.empty}</div>
    <div class="pulse">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <div class="right">
    <div class="top">
      <div class="titles">
        <div class="player-title">${c.title}</div>
        <div class="track-title" id="trackTitle">${t.empty}</div>
      </div>
      <button class="playlist-button" id="playlistBtn">${t.playlist}</button>
    </div>

    <div class="progress-area">
      <div class="time">
        <span id="current">0:00</span>
        <span id="duration">0:00</span>
      </div>
      <div class="progress" id="progress">
        <div class="fill" id="fill"></div>
      </div>
    </div>

    <div class="controls">
      <button class="icon" id="prev">⏮</button>
      <button class="play" id="play">▶</button>
      <button class="icon" id="next">⏭</button>
    </div>

    <div></div>

    <div class="tools">
      <div class="tool">
        <div class="tool-label">${t.speed}</div>
        <select id="speed">
          <option value="0.75">0.75×</option>
          <option value="1" selected>1×</option>
          <option value="1.25">1.25×</option>
          <option value="1.5">1.5×</option>
          <option value="2">2×</option>
        </select>
      </div>

      <div class="tool">
        <div class="tool-label">${t.volume}</div>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="0.85">
      </div>
    </div>

    <div class="playlist-panel" id="playlistPanel">
      <div class="playlist-head">
        <span>${t.choose}</span>
        <button class="close" id="closePlaylist">×</button>
      </div>
      <div class="tracks" id="tracks">
        <div class="message">${t.loading}</div>
      </div>
    </div>
  </div>
</div>

<audio id="audio" preload="metadata"></audio>

<script>
(function(){
  const cfg = ${safe};
  const t = ${safeText};

  const audio = document.getElementById("audio");
  const root = document.getElementById("root");
  const play = document.getElementById("play");
  const prev = document.getElementById("prev");
  const next = document.getElementById("next");
  const trackTitle = document.getElementById("trackTitle");
  const leftTitle = document.getElementById("leftTitle");
  const current = document.getElementById("current");
  const duration = document.getElementById("duration");
  const progress = document.getElementById("progress");
  const fill = document.getElementById("fill");
  const speed = document.getElementById("speed");
  const volume = document.getElementById("volume");
  const playlistBtn = document.getElementById("playlistBtn");
  const playlistPanel = document.getElementById("playlistPanel");
  const closePlaylist = document.getElementById("closePlaylist");
  const tracksBox = document.getElementById("tracks");

  let tracks = [];
  let index = 0;

  function isAudio(url){
    return /\\.(mp3|wav|ogg|m4a|aac|flac)(\\?.*)?$/i.test(url);
  }

  function nameFromUrl(url){
    try{
      const u = new URL(url);
      return decodeURIComponent(u.pathname.split("/").pop() || "Track")
        .replace(/\\.(mp3|wav|ogg|m4a|aac|flac)$/i,"")
        .replace(/[_-]+/g," ");
    }catch(e){
      return String(url).split("/").pop()
        .replace(/\\.(mp3|wav|ogg|m4a|aac|flac)$/i,"")
        .replace(/[_-]+/g," ");
    }
  }

  function time(s){
    if(!isFinite(s)) return "0:00";
    const m = Math.floor(s/60);
    const sec = Math.floor(s%60);
    return m + ":" + String(sec).padStart(2,"0");
  }

  function githubBlobToRaw(url){
    try{
      const u = new URL(url);
      if(u.hostname !== "github.com") return url;
      const parts = u.pathname.split("/").filter(Boolean);
      const blob = parts.indexOf("blob");
      if(blob < 0) return url;
      const owner = parts[0];
      const repo = parts[1];
      const branch = parts[blob + 1];
      const path = parts.slice(blob + 2).join("/");
      return "https://raw.githubusercontent.com/" + owner + "/" + repo + "/" + branch + "/" + path;
    }catch(e){
      return url;
    }
  }

  function message(msg){
    trackTitle.textContent = msg;
    leftTitle.textContent = msg;
    tracksBox.innerHTML = '<div class="message">' + msg + '</div>';
  }

  function renderPlaylist(){
    if(!tracks.length){
      message(t.notFound);
      return;
    }

    tracksBox.innerHTML = "";

    tracks.forEach((tr, i) => {
      const btn = document.createElement("button");
      btn.className = "track" + (i === index ? " active" : "");
      btn.textContent = (i + 1) + ". " + tr.title;
      btn.onclick = () => {
        index = i;
        loadTrack();
        start();
        playlistPanel.classList.remove("open");
      };
      tracksBox.appendChild(btn);
    });
  }

  function loadTrack(){
    if(!tracks.length){
      message(t.empty);
      return;
    }

    const tr = tracks[index];
    audio.src = tr.src;
    trackTitle.textContent = tr.title;
    leftTitle.textContent = tr.title;
    renderPlaylist();
  }

  async function start(){
    if(!tracks.length) return;
    try { await audio.play(); } catch(e) {}
  }

  function nextTrack(){
    if(!tracks.length) return;
    index = (index + 1) % tracks.length;
    loadTrack();
    start();
  }

  function prevTrack(){
    if(!tracks.length) return;
    index = (index - 1 + tracks.length) % tracks.length;
    loadTrack();
    start();
  }

  function rawList(src){
    return src
      .split(/[\\n,]+/)
      .map(x => x.trim())
      .filter(Boolean)
      .map(githubBlobToRaw)
      .filter(isAudio)
      .map(src => ({src, title:nameFromUrl(src)}));
  }

  async function githubFolder(url){
    const u = new URL(url);
    const parts = u.pathname.split("/").filter(Boolean);

    const owner = parts[0];
    const repo = parts[1];

    let branch = "main";
    let folder = "";

    const tree = parts.indexOf("tree");
    if(tree >= 0){
      branch = parts[tree + 1] || "main";
      folder = parts.slice(tree + 2).join("/");
    }

    const api = "https://api.github.com/repos/" + owner + "/" + repo + "/contents/" + folder + "?ref=" + branch;
    const res = await fetch(api);
    if(!res.ok) throw new Error("GitHub error");
    const data = await res.json();

    return data
      .filter(item => item.type === "file" && isAudio(item.name))
      .map(item => ({
        src: item.download_url,
        title: item.name.replace(/\\.(mp3|wav|ogg|m4a|aac|flac)$/i,"").replace(/[_-]+/g," ")
      }));
  }

  async function manifest(baseUrl){
    const base = baseUrl.replace(/\\/?$/, "/");
    const files = ["playlist.json","tracks.json","manifest.json"];

    for(const file of files){
      try{
        const res = await fetch(base + file);
        if(!res.ok) continue;
        const data = await res.json();

        if(Array.isArray(data)){
          return data.map(item => {
            if(typeof item === "string"){
              const src = item.startsWith("http") ? item : base + item.replace(/^\\//,"");
              return {src, title:nameFromUrl(src)};
            }

            const raw = item.src || item.url || item.file || "";
            const src = String(raw).startsWith("http") ? String(raw) : base + String(raw).replace(/^\\//,"");
            return {
              src,
              title: item.title || nameFromUrl(src)
            };
          }).filter(x => x.src && isAudio(x.src));
        }
      }catch(e){}
    }

    return [];
  }

  async function loadTracks(){
    const src = (cfg.source || "").trim();

    if(!src){
      message(t.empty);
      return;
    }

    message(t.loading);

    try{
      if(src.includes("\\n") || src.includes(",")){
        tracks = rawList(src);
      }else{
        const one = githubBlobToRaw(src);

        if(isAudio(one)){
          tracks = [{src:one, title:nameFromUrl(one)}];
        }else if(/^https:\\/\\/github\\.com\\//i.test(src) && src.includes("/tree/")){
          tracks = await githubFolder(src);
        }else{
          tracks = await manifest(src);
        }
      }
    }catch(e){
      tracks = [];
    }

    if(!tracks.length){
      message(t.notFound);
      return;
    }

    index = 0;
    loadTrack();
  }

  play.onclick = () => {
    if(audio.paused) start();
    else audio.pause();
  };

  prev.onclick = prevTrack;
  next.onclick = nextTrack;

  playlistBtn.onclick = () => {
    playlistPanel.classList.toggle("open");
  };

  closePlaylist.onclick = () => {
    playlistPanel.classList.remove("open");
  };

  speed.onchange = () => {
    audio.playbackRate = Number(speed.value);
  };

  volume.oninput = () => {
    audio.volume = Number(volume.value);
  };

  progress.onclick = e => {
    if(!audio.duration) return;
    const r = progress.getBoundingClientRect();
    const p = (e.clientX - r.left) / r.width;
    audio.currentTime = Math.max(0, Math.min(audio.duration, audio.duration * p));
  };

  audio.volume = Number(volume.value);

  audio.addEventListener("play", () => {
    play.textContent = "⏸";
    root.classList.add("playing");
  });

  audio.addEventListener("pause", () => {
    play.textContent = "▶";
    root.classList.remove("playing");
  });

  audio.addEventListener("loadedmetadata", () => {
    duration.textContent = time(audio.duration);
  });

  audio.addEventListener("timeupdate", () => {
    current.textContent = time(audio.currentTime);
    const p = audio.duration ? audio.currentTime / audio.duration * 100 : 0;
    fill.style.width = p + "%";
  });

  audio.addEventListener("ended", nextTrack);

  loadTracks();
})();
<\/script>
</body>
</html>`;
}

updateVals();
preview();
</script>
</body>
</html>
